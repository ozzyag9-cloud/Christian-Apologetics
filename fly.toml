# fly.toml app configuration file generated for christian-apologetics on 2026-05-12T17:38:00Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'christian-apologetics'
primary_region = 'ams'

[build]

[env]
  NODE_ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
